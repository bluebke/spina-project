services:
  db:
    image: postgres:16-alpine
    environment:
      # would remove for production
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: dev
      DATABASE_HOST: db
      DATABASE_USER: postgres
    volumes:
      # mount app to host for editing
      - app_data:/app
      # Keeps bundle cache across rebuilds
      - bundle_cache:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  app_data:
  bundle_cache: